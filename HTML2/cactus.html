    <title>Cactus Care</title>

<body>

    <h1>Propagating Cactus</h1>

    <ul>
        <li>Use healthy cactus cuttings</li>
        <li>Allow the cut end to dry before planting</li>
        <li>Plant in well-draining soil</li>
        <li>Place in a sunny location</li>
    </ul>

    <hr>

    <p>Remember to water sparingly.</p>

</body>
