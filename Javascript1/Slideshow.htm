<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>JavaScript Practice 1 - Slideshow</title>

<style>
    .flashclass {
        height: 200px;
        width: 200px;
        border: 5px solid orange;
        padding: 5px;
        text-align: center;
    }

    .flashclass img {
        border-width: 0;
    }
</style>

<script src="transitionshow.js"></script>

</head>

<body>

<script>
var flashyshow = new flashyslideshow({
    wrapperid: "myslideshow",
    wrapperclass: "flashclass",
    imagearray: [
        ["Images/Thumbnails/CoupleSailingSm.jpg", "", "", "Couple Sailing"],
        ["Images/Thumbnails/PigSm.jpg", "", "", "Pig and Boy"],
        ["Images/Thumbnails/SaladSm.jpg", "", "", "Yummy Salad"],
        ["Images/Thumbnails/StorkSm.jpg", "", "", "Stork at Sunset"]
    ],
    pause: 2000,
    transduration: 1000
});
</script>

</body>
</html>
